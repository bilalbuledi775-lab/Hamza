<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Bot Jump - Audio Edition</title>
    <style>
        /* CSS: Styling the game container and UI */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            border: 3px solid #66fcf1;
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 12, 16, 0.85);
            text-align: center;
            backdrop-filter: blur(3px);
            z-index: 20;
        }

        #score-display {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px #66fcf1, 0 0 20px #66fcf1;
            pointer-events: none;
            z-index: 10;
        }

        /* Mute Button Styling */
        #mute-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #1f2833;
            border: 2px solid #66fcf1;
            color: white;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        #mute-btn:hover {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 15px #66fcf1;
        }

        h1 { margin: 0; color: #66fcf1; text-shadow: 0 0 20px #45a29e; font-size: 3rem; }
        p { font-size: 1.2rem; color: #c5c6c7; }
        .hidden { display: none !important; }

        .action-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #1f2833;
            color: #66fcf1;
            border: 2px solid #66fcf1;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .action-btn:hover {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 20px #66fcf1;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="mute-btn" onclick="toggleMute()">🔊</button>
        <div id="score-display">0</div>
        
        <div id="start-screen" class="ui-layer">
            <h1>NEON BOT</h1>
            <p>Press Space or Click to Fly</p>
            <button class="action-btn" onclick="startGame()">START</button>
        </div>

        <div id="game-over" class="ui-layer hidden">
            <h1>Game over</h1>
            <p id="final-score">Score: 0</p>
            <button class="action-btn" onclick="startGame()">start</button>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        /**
         * JAVASCRIPT: Audio System Setup
         */
        let isMuted = false;
        
        // Load simple audio files (using reliable public URLs for demonstration)
        const sfxJump = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const sfxGameOver = new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3');
        const bgMusic = new Audio('https://assets.mixkit.co/active_storage/sfx/135/135-preview.mp3'); // Ambient loop

        // Preload and configure audio
        sfxJump.preload = 'auto';
        sfxJump.volume = 0.5;
        
        sfxGameOver.preload = 'auto';
        sfxGameOver.volume = 0.7;
        
        bgMusic.preload = 'auto';
        bgMusic.loop = true; // Make background music loop
        bgMusic.volume = 0.3;

        function playJumpSound() {
            if (isMuted) return;
            // Reset time to 0 prevents overlap glitches if player taps rapidly
            sfxJump.currentTime = 0; 
            sfxJump.play().catch(e => console.log("Audio play prevented:", e));
        }

        function playGameOverSound() {
            if (isMuted) return;
            sfxGameOver.currentTime = 0;
            sfxGameOver.play().catch(e => console.log("Audio play prevented:", e));
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
            
            if (isMuted) {
                bgMusic.pause();
            } else if (gameActive) {
                bgMusic.play().catch(e => console.log("Audio play prevented:", e));
            }
        }

        /**
         * JAVASCRIPT: Game Logic
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreText = document.getElementById('final-score');

        const GRAVITY = 0.4;
        const JUMP_FORCE = -7.5;
        const PIPE_SPEED = 3;
        const PIPE_SPAWN_RATE = 90;
        const PIPE_GAP = 160;

        let bot, pipes, score, gameActive, frameCount;

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0f0c29');
            gradient.addColorStop(0.5, '#302b63');
            gradient.addColorStop(1, '#24243e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        class Bot {
            constructor() {
                this.x = 60;
                this.y = canvas.height / 2;
                this.size = 24;
                this.velocity = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
                let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                ctx.rotate(rotation);

                if (this.velocity < 0) {
                    ctx.fillStyle = '#ff0055';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ff0055';
                    ctx.beginPath();
                    ctx.moveTo(-this.size/2 + 4, this.size/2);
                    ctx.lineTo(this.size/2 - 4, this.size/2);
                    ctx.lineTo(0, this.size/2 + 10 + Math.random() * 8); 
                    ctx.fill();
                }

                ctx.fillStyle = '#1f2833';
                ctx.strokeStyle = '#66fcf1';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#66fcf1';
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
                
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#ffffff';
                ctx.fillRect(-this.size/2 + 4, -this.size/2 + 6, 5, 5);
                ctx.fillRect(-this.size/2 + 15, -this.size/2 + 6, 5, 5);

                ctx.restore();
            }

            update() {
                this.velocity += GRAVITY;
                this.y += this.velocity;

                if (this.y + this.size > canvas.height) {
                    this.y = canvas.height - this.size;
                    endGame();
                }
                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
            }

            jump() {
                this.velocity = JUMP_FORCE;
                playJumpSound(); // Trigger Jump Sound
            }
        }

        class Pipe {
            constructor() {
                this.width = 60;
                this.topHeight = Math.random() * (canvas.height - PIPE_GAP - 120) + 60;
                this.x = canvas.width;
                this.passed = false;
            }

            drawPillar(x, y, width, height, isTop) {
                ctx.fillStyle = '#0b0c10';
                ctx.strokeStyle = '#c5c6c7';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#45a29e';
                ctx.fillRect(x, y, width, height);
                ctx.strokeRect(x, y, width, height);

                ctx.fillStyle = '#45a29e';
                ctx.shadowBlur = 15;
                const capHeight = 15;
                const capMargin = 4;
                
                if (isTop) {
                    ctx.fillRect(x - capMargin, y + height - capHeight, width + (capMargin*2), capHeight);
                } else {
                    ctx.fillRect(x - capMargin, y, width + (capMargin*2), capHeight);
                }
                ctx.shadowBlur = 0;
            }

            draw() {
                this.drawPillar(this.x, 0, this.width, this.topHeight, true);
                const bottomY = this.topHeight + PIPE_GAP;
                const bottomHeight = canvas.height - bottomY;
                this.drawPillar(this.x, bottomY, this.width, bottomHeight, false);
            }

            update() {
                this.x -= PIPE_SPEED;
            }
        }

        function startGame() {
            bot = new Bot();
            pipes = [];
            score = 0;
            frameCount = 0;
            gameActive = true;

            scoreElement.innerText = '0';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            // Start BGM on user interaction
            if (!isMuted) {
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e => console.log("Audio play prevented:", e));
            }

            gameLoop();
        }

        function endGame() {
            gameActive = false;
            finalScoreText.innerText = `Score: ${score}`;
            gameOverScreen.classList.remove('hidden');
            
            bgMusic.pause(); // Stop background music
            playGameOverSound(); // Play crash sound
        }

        function checkCollision(bot, pipe) {
            const botRight = bot.x + bot.size;
            const botBottom = bot.y + bot.size;
            const pipeRight = pipe.x + pipe.width;
            const bottomPipeY = pipe.topHeight + PIPE_GAP;

            if (botRight > pipe.x && bot.x < pipeRight) {
                if (bot.y < pipe.topHeight || botBottom > bottomPipeY) {
                    return true;
                }
            }
            return false;
        }

        function update() {
            if (!gameActive) return;

            bot.update();

            if (frameCount % PIPE_SPAWN_RATE === 0) {
                pipes.push(new Pipe());
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].update();

                if (checkCollision(bot, pipes[i])) {
                    endGame();
                }

                if (!pipes[i].passed && pipes[i].x + pipes[i].width < bot.x) {
                    score++;
                    scoreElement.innerText = score;
                    pipes[i].passed = true;
                }

                if (pipes[i].x + pipes[i].width < 0) {
                    pipes.splice(i, 1);
                }
            }

            frameCount++;
        }

        function draw() {
            drawBackground();
            pipes.forEach(pipe => pipe.draw());
            bot.draw();
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Controls
        function handleInput(e) {
            // Check for Spacebar or Left Mouse Click (button 0)
            if (e.code === 'Space' || (e.type === 'mousedown' && e.button === 0)) {
                // Ignore clicks that happen on the mute button
                if (e.target.id === 'mute-btn') return;

                if (gameActive) {
                    bot.jump();
                }
                if (e.code === 'Space') e.preventDefault();
            }
        }

        window.addEventListener('keydown', handleInput);
        window.addEventListener('mousedown', handleInput);

        // Initial background draw before game starts
        drawBackground();
    </script>
</body>
  </html>
